services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: chatbotdb
      POSTGRES_USER: chatbotuser
      POSTGRES_PASSWORD: chatbotpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot_network

  web:
    build: .
    container_name: django_chatbot
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - chatbot_network

volumes:
  postgres_data:

networks:
  chatbot_network:
    driver: bridge